---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: livekit-sip-operator
    control-plane: controller-manager
  name: livekit-sip-operator-controller-manager
  namespace: livekit-sip-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: livekit-sip-operator
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: livekit-sip-operator
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: LIVEKIT_URL
          valueFrom:
            secretKeyRef:
              key: url
              name: livekit-credentials
        - name: LIVEKIT_API_KEY
          valueFrom:
            secretKeyRef:
              key: api-key
              name: livekit-credentials
        - name: LIVEKIT_API_SECRET
          valueFrom:
            secretKeyRef:
              key: api-secret
              name: livekit-credentials
        image: controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports: []
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts: []
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: livekit-sip-operator-controller-manager
      terminationGracePeriodSeconds: 10
      volumes: []
