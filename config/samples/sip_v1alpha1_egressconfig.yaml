apiVersion: sip.livekit-sip.io/v1alpha1
kind: EgressConfig
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: minio-egress
spec:
  s3:
    region: us-east-1
    endpoint: "http://minio.minio.svc.cluster.local:9000"
    bucket: sessions
    forcePathStyle: true
    accessKeyRef:
      name: minio-credentials
      # key defaults to "access_key"; override with e.g. key: "username"
    secretKeyRef:
      name: minio-credentials
      # key defaults to "secret"; override with e.g. key: "password"
---
apiVersion: sip.livekit-sip.io/v1alpha1
kind: EgressConfig
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: azure-egress
spec:
  azure:
    containerName: sessions
    accountNameRef:
      name: azure-storage-credentials
      # key defaults to "account_name"
    accountKeyRef:
      name: azure-storage-credentials
      # key defaults to "account_key"
---
# Server-side credentials mode: omit the *Ref fields and the egress worker
# will use the credentials configured in its own `storage:` block. This
# avoids embedding sensitive credentials in the dispatch rule's RoomConfig
# (which trips the LiveKit token-refresh check on long-running calls).
apiVersion: sip.livekit-sip.io/v1alpha1
kind: EgressConfig
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: azure-egress-server-creds
spec:
  azure:
    containerName: sessions
