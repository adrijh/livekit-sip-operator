apiVersion: sip.livekit-sip.io/v1alpha1
kind: SIPDispatchRule
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: sipdispatchrule-sample
spec:
  livekitRef:
    service: livekit-server
    secretName: livekit-credentials
  name: my-dispatch-rule
  type: individual
  individual:
    roomPrefix: sip-call-
  hidePhoneNumber: true
  mediaEncryption: disable
