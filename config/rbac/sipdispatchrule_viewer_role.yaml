# This rule is not used by the project livekit-sip-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to sip.livekit-sip.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: sipdispatchrule-viewer-role
rules:
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - sipdispatchrules
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - sipdispatchrules/status
  verbs:
  - get
