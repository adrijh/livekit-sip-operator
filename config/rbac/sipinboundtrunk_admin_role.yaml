# This rule is not used by the project livekit-sip-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over sip.livekit-sip.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: livekit-sip-operator
    app.kubernetes.io/managed-by: kustomize
  name: sipinboundtrunk-admin-role
rules:
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - sipinboundtrunks
  verbs:
  - '*'
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - sipinboundtrunks/status
  verbs:
  - get
