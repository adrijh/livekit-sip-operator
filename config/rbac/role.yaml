---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - agentroutes
  - sipdispatchrules
  - sipinboundtrunks
  - sipnumbers
  - sipoutboundtrunks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - agentroutes/finalizers
  - sipdispatchrules/finalizers
  - sipinboundtrunks/finalizers
  - sipnumbers/finalizers
  - sipoutboundtrunks/finalizers
  verbs:
  - update
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - agentroutes/status
  - sipdispatchrules/status
  - sipinboundtrunks/status
  - sipnumbers/status
  - sipoutboundtrunks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - sip.livekit-sip.io
  resources:
  - egressconfigs
  verbs:
  - get
  - list
  - watch
